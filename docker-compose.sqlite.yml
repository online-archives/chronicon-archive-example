services:
  archiver:
    image: ghcr.io/19-84/chronicon:latest
    # Build from source instead:
    # build:
    #   context: https://github.com/19-84/chronicon.git
    #   dockerfile: Dockerfile
    volumes:
      - ./archives:/archives
      - ./.chronicon.toml:/home/chronicon/.chronicon.toml:ro
    environment:
      - CHRONICON_OUTPUT_DIR=/archives
